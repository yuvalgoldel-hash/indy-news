<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div style="display:grid;grid-template-columns:360px 1fr;height:100%;overflow:hidden;">

  <!-- LEFT PANEL -->
  <div style="background:white;border-left:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden;">
    <div style="padding:14px 18px;border-bottom:1px solid #e5e7eb;flex-shrink:0;">
      <div style="font-size:15px;font-weight:800;margin-bottom:3px;">🏘️ Indianapolis Neighborhoods</div>
      <div style="font-size:11px;color:#6b7280;">Sorted by crime rate · Hover to locate on map</div>
    </div>
    <div id="nbhd-list" style="overflow-y:auto;flex:1;">
      {% set neighborhoods = get_neighborhoods() %}
      {% for n in neighborhoods %}
      <div class="nbhd-row"
           data-lat="{{ n.lat }}" data-lng="{{ n.lng }}"
           data-name="{{ n.name }}" data-crime="{{ n.crime_index }}"
           data-crime-label="{{ n.crime_label }}" data-price="{{ n.avg_price }}"
           data-dom="{{ n.dom }}" data-zip="{{ n.zip }}"
           data-notes="{{ n.notes }}" data-flip="{{ n.flip_rating }}"
           data-rental="{{ n.rental_rating }}"
           style="display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background 0.15s;"
           onmouseenter="hoverNbhd(this)"
           onmouseleave="this.style.background=''"
           onclick="hoverNbhd(this)">
        <div style="font-size:11px;font-weight:700;color:#9ca3af;width:18px;text-align:center;flex-shrink:0;">{{ loop.index }}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:#1a1a2e;">{{ n.name }}</div>
          <div style="font-size:11px;color:#9ca3af;margin-top:1px;">ZIP {{ n.zip }}</div>
          <div style="display:flex;gap:10px;margin-top:3px;">
            <span style="font-size:11px;font-weight:600;color:#1a1a2e;">💰 ${{ "{:,}".format(n.avg_price) }}</span>
            <span style="font-size:11px;font-weight:600;color:#6b7280;">📅 {{ n.dom }}d</span>
          </div>
        </div>
        <div style="font-size:10px;font-weight:800;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;
          {% if n.crime_index <= 2 %}background:#dcfce7;color:#166534;
          {% elif n.crime_index <= 4 %}background:#fef9c3;color:#854d0e;
          {% elif n.crime_index <= 6 %}background:#ffedd5;color:#9a3412;
          {% else %}background:#fee2e2;color:#991b1b;{% endif %}">
          {{ n.crime_label }}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- MAP -->
  <div id="nbhd-map" style="width:100%;height:100%;"></div>
</div>

<script>
var nbhdMap = null;
var nbhdMarkers = {};

function crimeColor(i) {
  if (i <= 2) return '#22c55e';
  if (i <= 4) return '#eab308';
  if (i <= 6) return '#f97316';
  return '#ef4444';
}

function fmt(p) {
  return '$' + (p >= 1000 ? Math.round(p/1000) + 'k' : p);
}

function initNeighborhoodMap() {
  nbhdMap = L.map('nbhd-map', { zoomControl: true }).setView([39.7684, -86.1581], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 18
  }).addTo(nbhdMap);

  document.querySelectorAll('.nbhd-row').forEach(function(el) {
    var lat = parseFloat(el.dataset.lat);
    var lng = parseFloat(el.dataset.lng);
    var name = el.dataset.name;
    var crime = parseInt(el.dataset.crime);
    var color = crimeColor(crime);

    var icon = L.divIcon({
      className: '',
      html: '<div style="background:'+color+';width:13px;height:13px;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
      iconSize: [13,13], iconAnchor: [6,6]
    });

    var marker = L.marker([lat, lng], {icon: icon}).addTo(nbhdMap);
    var crimeBg = crime<=2?'#dcfce7':crime<=4?'#fef9c3':crime<=6?'#ffedd5':'#fee2e2';
    var crimeText = crime<=2?'#166534':crime<=4?'#854d0e':crime<=6?'#9a3412':'#991b1b';
    marker.bindPopup(
      '<div style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;width:240px;padding:4px 2px;">' +

      '<div style="font-size:15px;font-weight:800;color:#111827;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #f3f4f6;">' + name + '</div>' +

      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
        '<span style="font-size:11px;color:#6b7280;font-weight:600;">CRIME LEVEL</span>' +
        '<span style="font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;background:'+crimeBg+';color:'+crimeText+';">'+el.dataset.crimeLabel+'</span>' +
      '</div>' +

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">' +
        '<div style="background:#f9fafb;border-radius:8px;padding:8px 10px;">' +
          '<div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-bottom:2px;">Avg Price</div>' +
          '<div style="font-size:16px;font-weight:800;color:#111827;">'+fmt(parseInt(el.dataset.price))+'</div>' +
        '</div>' +
        '<div style="background:#f9fafb;border-radius:8px;padding:8px 10px;">' +
          '<div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-bottom:2px;">Days on Market</div>' +
          '<div style="font-size:16px;font-weight:800;color:#111827;">'+el.dataset.dom+' <span style="font-size:11px;color:#6b7280;font-weight:400;">days</span></div>' +
        '</div>' +
      '</div>' +

      '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span style="font-size:12px;color:#6b7280;font-weight:500;">Fix & Flip</span>' +
          '<span style="font-size:13px;">'+el.dataset.flip+'</span>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span style="font-size:12px;color:#6b7280;font-weight:500;">Rental</span>' +
          '<span style="font-size:13px;">'+el.dataset.rental+'</span>' +
        '</div>' +
      '</div>' +

      '<div style="font-size:11px;color:#9ca3af;line-height:1.5;padding-top:8px;border-top:1px solid #f3f4f6;">' + el.dataset.notes + '</div>' +

      '</div>',
      { maxWidth: 280 }
    );
    nbhdMarkers[name] = marker;
  });
}

function hoverNbhd(el) {
  el.style.background = '#f0f4ff';
  var lat = parseFloat(el.dataset.lat);
  var lng = parseFloat(el.dataset.lng);
  var name = el.dataset.name;
  if (nbhdMap && nbhdMarkers[name]) {
    nbhdMap.flyTo([lat, lng], 14, {duration: 0.5});
    nbhdMarkers[name].openPopup();
  }
}
</script>
